name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Get commit tag
        run: echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Load registry IP
        run: |
          export $(cat /home/ec2-user/registry.env)
          echo "Registry is $REGISTRY_HOST"

      - name: Wait for image
        run: |
          export $(cat /home/ec2-user/registry.env)

          echo "Waiting for image"

          for i in {1..45}; do
            TAGS=$(curl -s http://$REGISTRY_HOST:5000/v2/appspringboot/tags/list)

            if echo "$TAGS" | grep -q "\"$TAG\""; then
              echo "Image $TAG found!"
              exit 0
            fi

            echo "Waiting... ($i)"
            sleep 5
          done

          echo "Timeout waiting for image"
          exit 1

      - name: Deploy with retry
        run: |
          export $(cat /home/ec2-user/registry.env)
          cd /home/ec2-user

          export DEV_TAG=$TAG
          export PROD_TAG=$TAG

          docker compose down

          docker image prune -af || true

          for i in {1..10}; do
            docker pull ${REGISTRY_HOST}:5000/appspringboot:$TAG && break
            echo "Retry pull $i..."
            sleep 5
          done
          docker compose up -d --force-recreate
