name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Load registry IP
        run: |
          export $(cat /home/ec2-user/registry.env)
          echo "Registry is $REGISTRY_HOST"

      - name: Deploy with Docker Compose
        run: |
          export $(cat /home/ec2-user/registry.env)
          cd /home/ec2-user/app
          docker compose pull
          docker compose up -d